<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aftersummer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="toggles">
      <label class="toggle" id="workModeLabel">
        <input type="checkbox" id="workMode">
        <span class="track"></span>
        <span class="toggle-label">Work time</span>
      </label>
      <label class="toggle" id="bridgeDaysLabel">
        <input type="checkbox" id="bridgeDays">
        <span class="track"></span>
        <span class="toggle-label">Bridge days</span>
      </label>
    </div>
  </header>
  <main id="cards"></main>
  <script type="module" src="app.js"></script>
</body>
</html>
